<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Capstone Project</title>
</head>
<body>
    <h1>Alarm System</h1>
    <button id="alarm-button">Set Alarm</button>

    <script>
        // Web Audio API to create an alarm sound
        function playAlarmTone() {
            const audioContext = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = audioContext.createOscillator();
            oscillator.type = 'square'; // Type of wave
            oscillator.frequency.setValueAtTime(440, audioContext.currentTime); // Frequency in hertz
            oscillator.connect(audioContext.destination);
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 1); // Play sound for 1 second
        }

        document.getElementById('alarm-button').addEventListener('click', playAlarmTone);
    </script>
</body>
</html>
